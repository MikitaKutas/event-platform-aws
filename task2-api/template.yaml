AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Event Platform API (Task 2) — API Gateway + Lambda + DynamoDB

Parameters:
  EventsTableName:
    Type: String
    Default: Events
  RegistrationsTableName:
    Type: String
    Default: Registrations

Globals:
  Function:
    Runtime: nodejs18.x
    Timeout: 10
    MemorySize: 256
    Architectures: [arm64]
    Environment:
      Variables:
        EVENTS_TABLE: !Ref EventsTableName
        REGISTRATIONS_TABLE: !Ref RegistrationsTableName
  Api:
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization'"
      AllowOrigin: "'*'"

Resources:
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref EventsTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  RegistrationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref RegistrationsTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: eventId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: byEventId
          KeySchema:
            - AttributeName: eventId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  CreateEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: event-platform-create-event
      CodeUri: lambdas/create-event/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /event
            Method: POST

  RegisterUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: event-platform-register-user
      CodeUri: lambdas/register-user/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RegistrationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /register
            Method: POST

  GetStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: event-platform-get-stats
      CodeUri: lambdas/get-stats/
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /stats
            Method: GET

Outputs:
  ApiBaseUrl:
    Description: REST API base URL — это значение клади в .env как API_BASE_URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  EventsTable:
    Value: !Ref EventsTable
  RegistrationsTable:
    Value: !Ref RegistrationsTable
